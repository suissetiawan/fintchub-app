<!doctype html>
<html lang="en">

<head>
  <script>
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <meta charset="UTF-8" />
  <link rel="icon" href="/plain_logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- PWA Primary Tags -->
  <title>Fincthub — Smart Financial Tracker</title>
  <meta name="description" content="Premium Personal Finance Manager" />
  <meta name="theme-color" content="#3b82f6" />

  <!-- Apple Mobile Web App Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fincthub" />
  <link rel="apple-touch-icon" href="/plain_logo.png" />

  <style>
    /* Splash Screen CSS */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out, visibility 0.5s;
    }

    html.dark #splash-screen {
      background-color: #0f172a;
    }

    .splash-logo-container {
      width: 90px;
      height: 90px;
      border-radius: 20px;
      background-color: #2563eb;
      /* tailwind blue-600 */
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 16px;
      animation: pulse 2s infinite ease-in-out;
      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.4);
    }

    html.dark .splash-logo-container {
      background-color: #3b82f6;
      /* tailwind blue-500 */
      box-shadow: none;
    }

    .splash-logo-container svg {
      width: 48px;
      height: 48px;
      color: #ffffff;
    }

    .splash-text {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }

    html.dark .splash-text {
      color: #ffffff;
    }

    .splash-loader {
      width: 40px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .splash-loader::after {
      content: '';
      position: absolute;
      width: 40%;
      height: 100%;
      background: #3b82f6;
      animation: loading 1.5s infinite ease-in-out;
      border-radius: 4px;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.05);
        opacity: 0.8;
      }
    }

    @keyframes loading {
      0% {
        left: -40%;
      }

      100% {
        left: 100%;
      }
    }

    body.app-loaded #splash-screen {
      opacity: 0;
      visibility: hidden;
    }
  </style>
</head>

<body class="dark:bg-slate-900 bg-white">
  <div id="splash-screen">
    <div class="splash-logo-container">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a8 8 0 0 1-5.45 7.49" />
        <path d="M12 9.6V20" />
        <path d="M3 15a3 3 0 0 1 3-3h4" />
        <path d="M3 15v-6" />
        <path d="M21 15v-4" />
        <path d="M21 11h-4a2 2 0 0 0 0 4h4" />
      </svg>
    </div>
    <h2 class="splash-text">Fincthub</h2>
    <div class="splash-loader"></div>
  </div>

  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>

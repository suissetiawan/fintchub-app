services:
  fincthub-api:
    image: suistwn/fincthub-api:latest
    container_name: fincthub-api
    restart: always
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - RUN_MIGRATIONS=true
      - RUN_SEEDS=false
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    networks:
      - apps-network

  fincthub-ui:
    image: suistwn/fincthub-ui:latest
    container_name: fincthub-ui
    restart: always
    ports:
      - "3000:3000"
    networks:
      - apps-network

networks:
  apps-network:
    external: true

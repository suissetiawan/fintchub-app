name: CI - Quality Metrics

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Linting
        run: npm run lint:all

      - name: Run Type Check (UI)
        run: npm run type-check:all

      - name: Build Check (API)
        run: |
          cd api
          docker build -t api-test .

      - name: Build Check (UI)
        run: |
          cd ui
          docker build -t ui-test --build-arg VITE_API_BASE_URL=http://localhost:5000 .

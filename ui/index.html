<!doctype html>
<html lang="en">

<head>
  <script>
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
    
    // Hide splash screen on refresh if user is already logged in
    const token = localStorage.getItem('accessToken');
    const splashShown = sessionStorage.getItem('splashShown');
    if (token && splashShown) {
      document.documentElement.classList.add('hide-splash-fast');
    }
  </script>
  <meta charset="UTF-8" />
  <link rel="icon" href="/plain_logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- PWA Primary Tags -->
  <title>Fincthub — Smart Financial Tracker</title>
  <meta name="description" content="Premium Personal Finance Manager" />
  <meta name="theme-color" content="#3b82f6" />

  <!-- Apple Mobile Web App Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fincthub" />
  <link rel="apple-touch-icon" href="/plain_logo.png" />

  <style>
    /* Splash Screen CSS */
    html.hide-splash-fast #splash-screen {
      display: none !important;
    }

    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out, visibility 0.5s;
    }

    html.dark #splash-screen {
      background-color: #0f172a;
    }

    .splash-logo-container {
      width: 100px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 16px;
      animation: pulse 2s infinite ease-in-out;
    }

    .splash-text {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }

    html.dark .splash-text {
      color: #ffffff;
    }

    .splash-loader {
      width: 40px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .splash-loader::after {
      content: '';
      position: absolute;
      width: 40%;
      height: 100%;
      background: #3b82f6;
      animation: loading 1.5s infinite ease-in-out;
      border-radius: 4px;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.05);
        opacity: 0.8;
      }
    }

    @keyframes loading {
      0% {
        left: -40%;
      }

      100% {
        left: 100%;
      }
    }

    body.app-loaded #splash-screen {
      opacity: 0;
      visibility: hidden;
    }
  </style>
</head>

<body class="dark:bg-slate-900 bg-white">
  <div id="splash-screen">
    <div class="splash-logo-container">
      <img src="/plain_logo.png" alt="Fincthub Logo" style="width: 100%; height: 100%; object-fit: contain;" />
    </div>
    <h2 class="splash-text uppercase tracking-wider">Fincthub</h2>
    <div class="splash-loader"></div>
  </div>

  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
